<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1520" viewBox="0 0 800 1520">
  <defs>
    <!-- CSS Animation Styles for Interactivity/Motion -->
    <style>
      @keyframes pulseGlow {
        0% { opacity: 0.5; filter: drop-shadow(0 0 2px #10B981); }
        50% { opacity: 0.9; filter: drop-shadow(0 0 10px #34D399); }
        100% { opacity: 0.5; filter: drop-shadow(0 0 2px #10B981); }
      }
      @keyframes scanlineMove {
        0% { transform: translateY(0px); }
        100% { transform: translateY(4px); }
      }
      @keyframes floatCard {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-3px); }
        100% { transform: translateY(0px); }
      }
      .animated-border { animation: pulseGlow 3s infinite ease-in-out; }
      .floating-card { animation: floatCard 4s infinite ease-in-out; }
      .floating-card-delayed { animation: floatCard 4s infinite ease-in-out 2s; }
    </style>

    <!-- Matrix Green Color Matrix -->
    <filter id="matrix-hologram">
      <feColorMatrix type="matrix" values="
        0.2  0.7  0.1  0   0
        0.2  0.9  0.1  0   0
        0.1  0.5  0.1  0   0
        0    0    0    1   0" />
    </filter>

    <!-- Scanline Pattern for Hologram Grid Effect -->
    <pattern id="scanlines" width="800" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="800" y2="0" stroke="#000000" stroke-width="1.5" opacity="0.35" />
    </pattern>

    <!-- Deep Neon Glow & 3D Shadow Effect -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComponentTransfer in="blur" result="glow1">
        <feFuncA type="linear" slope="0.8"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Floating 3D Card Shadow Filter -->
    <filter id="card-3d-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.75" />
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#059669" flood-opacity="0.3" />
    </filter>

    <!-- Inner Panel Highlight Gradient -->
    <linearGradient id="panel-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#052212" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#010D06" stop-opacity="0.95" />
    </linearGradient>
  </defs>

  <!-- Background Base with Radial Gradient for Depth -->
  <radialGradient id="bg-radial" cx="50%" cy="30%" r="70%">
    <stop offset="0%" stop-color="#062412" />
    <stop offset="50%" stop-color="#020C06" />
    <stop offset="100%" stop-color="#010402" />
  </radialGradient>
  <rect width="100%" height="100%" fill="url(#bg-radial)" rx="16" />

  <!-- Hologram Grid Background Details -->
  <g stroke="#10B981" stroke-width="0.5" opacity="0.12">
    <path d="M 0,100 L 800,100 M 0,300 L 800,300 M 0,500 L 800,500 M 0,700 L 800,700 M 0,900 L 800,900 M 0,1100 L 800,1100 M 0,1300 L 800,1300" />
    <path d="M 100,0 L 100,1520 M 300,0 L 300,1520 M 500,0 L 500,1520 M 700,0 L 700,1520" />
  </g>

  <!-- Outer Animated Neon Border -->
  <rect x="8" y="8" width="784" height="1504" fill="none" stroke="#047857" stroke-width="1" rx="14" opacity="0.3" />
  <rect class="animated-border" x="12" y="12" width="776" height="1496" fill="none" stroke="#10B981" stroke-width="2" stroke-dasharray="10 6" rx="12" />
  <rect x="18" y="18" width="764" height="1484" fill="none" stroke="#34D399" stroke-width="0.75" rx="10" opacity="0.4" />

  <!-- HEADER / TITLE SECTION -->
  <g transform="translate(40, 45)" filter="url(#card-3d-shadow)" class="floating-card">
    <rect x="0" y="0" width="720" height="90" fill="url(#panel-grad)" stroke="#34D399" stroke-width="2" rx="8" />
    <path d="M 0,15 L 0,0 L 15,0" fill="none" stroke="#6EE7B7" stroke-width="3" />
    <path d="M 720,15 L 720,0 L 705,0" fill="none" stroke="#6EE7B7" stroke-width="3" />
    <path d="M 0,75 L 0,90 L 15,90" fill="none" stroke="#6EE7B7" stroke-width="3" />
    <path d="M 720,75 L 720,90 L 705,90" fill="none" stroke="#6EE7B7" stroke-width="3" />

    <text x="360" y="38" font-family="monospace" font-size="22" fill="#34D399" text-anchor="middle" font-weight="bold" letter-spacing="1" filter="url(#neon-glow)">KHRESMUPU // PROFILE MATRIX</text>
    <text x="360" y="65" font-family="monospace" font-size="12" fill="#6EE7B7" text-anchor="middle" opacity="0.95">[SYSTEM_STATUS: ACTIVE // CREATIVE DEVELOPER &amp; 3D ENTHUSIAST]</text>
    
    <rect x="0" y="105" width="720" height="42" fill="#010F07" stroke="#10B981" stroke-width="1.25" rx="6" />
    <text x="360" y="131" font-family="monospace" font-size="11" fill="#A7F3D0" text-anchor="middle" font-style="italic">✨ "Mengembangkan pengalaman digital interaktif: Teknologi, Edukasi, &amp; Kreativitas." ✨</text>
  </g>

  <!-- SECTION 1: TENTANG SAYA -->
  <g transform="translate(40, 220)" filter="url(#card-3d-shadow)" class="floating-card-delayed">
    <rect x="0" y="0" width="720" height="185" fill="url(#panel-grad)" stroke="#10B981" stroke-width="1.75" rx="8" />
    <path d="M 0,0 L 25,0 L 0,25 Z" fill="#34D399" />
    <text x="32" y="32" font-family="monospace" font-size="16" fill="#34D399" font-weight="bold" filter="url(#neon-glow)">&gt; 📖 TENTANG SAYA</text>
    <line x1="25" y1="42" x2="695" y2="42" stroke="#34D399" stroke-width="1" opacity="0.6" />

    <text x="25" y="70" font-family="monospace" font-size="12" fill="#A7F3D0">Halo! Saya <tspan fill="#34D399" font-weight="bold">Khresna Mulia Putra</tspan> (atau <tspan fill="#34D399" font-weight="bold">Khresmupu</tspan>), seorang Creative</text>
    <text x="25" y="90" font-family="monospace" font-size="12" fill="#A7F3D0">Developer &amp; mahasiswa <tspan fill="#34D399" font-weight="bold">Teknik Informatika Universitas Kristen Maranatha</tspan>.</text>
    <text x="25" y="118" font-family="monospace" font-size="12" fill="#A7F3D0">Berfokus pada website informatif yang menghadirkan pengalaman belajar interaktif</text>
    <text x="25" y="138" font-family="monospace" font-size="12" fill="#A7F3D0">lewat <tspan fill="#34D399" font-weight="bold">animasi 3D</tspan> dan teknologi modern. Serta menyalurkan kreativitas lewat</text>
    <text x="25" y="158" font-family="monospace" font-size="12" fill="#A7F3D0"><tspan fill="#34D399" font-weight="bold">produksi musik instrumental</tspan> dengan pendekatan storytelling.</text>
  </g>

  <!-- SECTION 2: FILOSOFI PENGEMBANGAN -->
  <g transform="translate(40, 435)" filter="url(#card-3d-shadow)" class="floating-card">
    <rect x="0" y="0" width="720" height="135" fill="url(#panel-grad)" stroke="#10B981" stroke-width="1.75" rx="8" />
    <text x="32" y="32" font-family="monospace" font-size="16" fill="#34D399" font-weight="bold" filter="url(#neon-glow)">&gt; 🎯 FILOSOFI PENGEMBANGAN</text>
    <line x1="25" y1="42" x2="695" y2="42" stroke="#34D399" stroke-width="1" opacity="0.6" />

    <g transform="translate(25, 55)"><rect width="218" height="28" fill="#011F0E" stroke="#34D399" stroke-width="1.25" rx="4"/><text x="109" y="18" font-family="monospace" font-size="11" fill="#6EE7B7" text-anchor="middle" font-weight="bold">🧠 01. Edukatif</text></g>
    <g transform="translate(251, 55)"><rect width="218" height="28" fill="#011F0E" stroke="#34D399" stroke-width="1.25" rx="4"/><text x="109" y="18" font-family="monospace" font-size="11" fill="#6EE7B7" text-anchor="middle" font-weight="bold">⚡ 02. Interaktif</text></g>
    <g transform="translate(477, 55)"><rect width="218" height="28" fill="#011F0E" stroke="#34D399" stroke-width="1.25" rx="4"/><text x="109" y="18" font-family="monospace" font-size="11" fill="#6EE7B7" text-anchor="middle" font-weight="bold">📱 03. Responsif</text></g>
    <g transform="translate(25, 90)"><rect width="218" height="28" fill="#011F0E" stroke="#34D399" stroke-width="1.25" rx="4"/><text x="109" y="18" font-family="monospace" font-size="11" fill="#6EE7B7" text-anchor="middle" font-weight="bold">🎯 04. Mudah Digunakan</text></g>
    <g transform="translate(251, 90)"><rect width="218" height="28" fill="#011F0E" stroke="#34D399" stroke-width="1.25" rx="4"/><text x="109" y="18" font-family="monospace" font-size="11" fill="#6EE7B7" text-anchor="middle" font-weight="bold">🎨 05. Estetis &amp; Bersih</text></g>
    <g transform="translate(477, 90)"><rect width="218" height="28" fill="#011F0E" stroke="#34D399" stroke-width="1.25" rx="4"/><text x="109" y="18" font-family="monospace" font-size="11" fill="#6EE7B7" text-anchor="middle" font-weight="bold">🚀 06. UX Optimal</text></g>
  </g>

  <!-- SECTION 3: BIDANG KEAHLIAN UTAMA -->
  <g transform="translate(40, 590)" filter="url(#card-3d-shadow)" class="floating-card-delayed">
    <rect x="0" y="0" width="720" height="210" fill="url(#panel-grad)" stroke="#10B981" stroke-width="1.75" rx="8" />
    <text x="32" y="32" font-family="monospace" font-size="16" fill="#34D399" font-weight="bold" filter="url(#neon-glow)">&gt; 🚀 BIDANG KEAHLIAN UTAMA</text>
    <line x1="25" y1="42" x2="695" y2="42" stroke="#34D399" stroke-width="1" opacity="0.6" />

    <g transform="translate(25, 55)"><rect width="218" height="135" fill="#011A0C" stroke="#34D399" stroke-width="1.5" rx="6"/><text x="15" y="24" font-family="monospace" font-size="12" fill="#6EE7B7" font-weight="bold">🌐 Web Dev</text><text x="15" y="48" font-family="monospace" font-size="10" fill="#A7F3D0">Membangun website</text><text x="15" y="63" font-family="monospace" font-size="10" fill="#A7F3D0">modern, terstruktur,</text><text x="15" y="78" font-family="monospace" font-size="10" fill="#A7F3D0">dan mudah dipelihara.</text><rect x="12" y="95" width="194" height="26" fill="#000803" stroke="#10B981" stroke-width="1.25" rx="4"/><text x="109" y="112" font-family="monospace" font-size="9" fill="#34D399" text-anchor="middle" font-weight="bold">HTML • CSS • JS • PHP</text></g>
    <g transform="translate(251, 55)"><rect width="218" height="135" fill="#011A0C" stroke="#34D399" stroke-width="1.5" rx="6"/><text x="15" y="24" font-family="monospace" font-size="12" fill="#6EE7B7" font-weight="bold">🎬 Animasi 3D</text><text x="15" y="48" font-family="monospace" font-size="10" fill="#A7F3D0">Integrasi model Blender</text><text x="15" y="63" font-family="monospace" font-size="10" fill="#A7F3D0">untuk media edukasi</text><text x="15" y="78" font-family="monospace" font-size="10" fill="#A7F3D0">visual yang interaktif.</text><rect x="12" y="95" width="194" height="26" fill="#000803" stroke="#10B981" stroke-width="1.25" rx="4"/><text x="109" y="112" font-family="monospace" font-size="9" fill="#34D399" text-anchor="middle" font-weight="bold">Blender • 3D Web • Canvas</text></g>
    <g transform="translate(477, 55)"><rect width="218" height="135" fill="#011A0C" stroke="#34D399" stroke-width="1.5" rx="6"/><text x="15" y="24" font-family="monospace" font-size="12" fill="#6EE7B7" font-weight="bold">🎵 Musik Digital</text><text x="15" y="48" font-family="monospace" font-size="10" fill="#A7F3D0">Komposisi musik</text><text x="15" y="63" font-family="monospace" font-size="10" fill="#A7F3D0">instrumental orisinal</text><text x="15" y="78" font-family="monospace" font-size="10" fill="#A7F3D0">berbasis storytelling.</text><rect x="12" y="95" width="194" height="26" fill="#000803" stroke="#10B981" stroke-width="1.25" rx="4"/><text x="109" y="112" font-family="monospace" font-size="9" fill="#34D399" text-anchor="middle" font-weight="bold">BandLab • Walk Band</text></g>
  </g>

  <!-- SECTION 4: KEAHLIAN TEKNIS & METRIK -->
  <g transform="translate(40, 820)" filter="url(#card-3d-shadow)" class="floating-card">
    <rect x="0" y="0" width="720" height="215" fill="url(#panel-grad)" stroke="#10B981" stroke-width="1.75" rx="8" />
    <text x="32" y="32" font-family="monospace" font-size="16" fill="#34D399" font-weight="bold" filter="url(#neon-glow)">&gt; 💻 KEAHLIAN TEKNIS &amp; METRIK</text>
    <line x1="25" y1="42" x2="695" y2="42" stroke="#34D399" stroke-width="1" opacity="0.6" />

    <text x="25" y="68" font-family="monospace" font-size="11" fill="#6EE7B7" font-weight="bold">Web Frontend &amp; Responsive Design (80%)</text>
    <rect x="25" y="76" width="670" height="12" fill="#000502" stroke="#059669" stroke-width="1" rx="3" />
    <rect x="25" y="76" width="536" height="12" fill="url(#panel-grad)" stroke="#34D399" stroke-width="1" rx="3" filter="url(#neon-glow)" />

    <text x="25" y="108" font-family="monospace" font-size="11" fill="#6EE7B7" font-weight="bold">UI / UX Design (80%)</text>
    <rect x="25" y="116" width="670" height="12" fill="#000502" stroke="#059669" stroke-width="1" rx="3" />
    <rect x="25" y="116" width="536" height="12" fill="url(#panel-grad)" stroke="#34D399" stroke-width="1" rx="3" filter="url(#neon-glow)" />

    <text x="25" y="148" font-family="monospace" font-size="11" fill="#6EE7B7" font-weight="bold">Blender 3D &amp; 3D Web (75%)</text>
    <rect x="25" y="156" width="670" height="12" fill="#000502" stroke="#059669" stroke-width="1" rx="3" />
    <rect x="25" y="156" width="502" height="12" fill="url(#panel-grad)" stroke="#34D399" stroke-width="1" rx="3" filter="url(#neon-glow)" />

    <text x="25" y="188" font-family="monospace" font-size="11" fill="#6EE7B7" font-weight="bold">Backend PHP, SQL &amp; Music Production (50% - 65%)</text>
    <rect x="25" y="196" width="670" height="12" fill="#000502" stroke="#059669" stroke-width="1" rx="3" />
    <rect x="25" y="196" width="385" height="12" fill="url(#panel-grad)" stroke="#10B981" stroke-width="1" rx="3" />
  </g>

  <!-- SECTION 5: PROYEK UNGGULAN -->
  <g transform="translate(40, 1055)" filter="url(#card-3d-shadow)" class="floating-card-delayed">
    <rect x="0" y="0" width="720" height="235" fill="url(#panel-grad)" stroke="#10B981" stroke-width="1.75" rx="8" />
    <text x="32" y="32" font-family="monospace" font-size="16" fill="#34D399" font-weight="bold" filter="url(#neon-glow)">&gt; 🌟 PROYEK UNGGULAN &amp; INOVASI 3D</text>
    <line x1="25" y1="42" x2="695" y2="42" stroke="#34D399" stroke-width="1" opacity="0.6" />

    <g transform="translate(25, 55)"><rect width="670" height="52" fill="#011F0E" stroke="#34D399" stroke-width="1.25" rx="6"/><text x="15" y="20" font-family="monospace" font-size="12" fill="#6EE7B7" font-weight="bold">🏊 Tirta Sapa — Website Pembelajaran Renang 3D (2025)</text><text x="15" y="38" font-family="monospace" font-size="10" fill="#A7F3D0">Media visual interaktif mekanika &amp; teknik renang | Tech: HTML/CSS/JS, Blender 3D</text></g>
    <g transform="translate(25, 115)"><rect width="670" height="52" fill="#011F0E" stroke="#34D399" stroke-width="1.25" rx="6"/><text x="15" y="20" font-family="monospace" font-size="12" fill="#6EE7B7" font-weight="bold">🏯 Jogja Culture — Website Edukasi Budaya Yogyakarta (2026)</text><text x="15" y="38" font-family="monospace" font-size="10" fill="#A7F3D0">Eksplorasi sejarah, galeri artefak digital, &amp; peta wisata | Tech: Tailwind, jQuery</text></g>
    <g transform="translate(25, 175)"><rect width="670" height="52" fill="#011F0E" stroke="#34D399" stroke-width="1.25" rx="6"/><text x="15" y="20" font-family="monospace" font-size="12" fill="#6EE7B7" font-weight="bold">💰 KasKeuangan Khresmupu — Manajemen Keuangan (2026)</text><text x="15" y="38" font-family="monospace" font-size="10" fill="#A7F3D0">Sistem pencatatan kas &amp; rekapitulasi database SQL | Tech: PHP, SQL, JavaScript</text></g>
  </g>

  <!-- SECTION 6: MINAT & FOCUS RESEARCH -->
  <g transform="translate(40, 1310)" filter="url(#card-3d-shadow)" class="floating-card">
    <rect x="0" y="0" width="720" height="150" fill="url(#panel-grad)" stroke="#10B981" stroke-width="1.75" rx="8" />
    <text x="32" y="28" font-family="monospace" font-size="14" fill="#34D399" font-weight="bold" filter="url(#neon-glow)">&gt; 🎯 RESEARCH_FOCUS.json</text>
    <line x1="25" y1="36" x2="695" y2="36" stroke="#34D399" stroke-width="1" opacity="0.5" />

    <text x="40" y="58" font-family="monospace" font-size="11" fill="#6EE7B7" font-weight="bold">{</text>
    <text x="60" y="75" font-family="monospace" font-size="11" fill="#A7F3D0">"developer": <tspan fill="#6EE7B7" font-weight="bold">"Khresna Mulia Putra (Khresmupu)"</tspan>,</text>
    <text x="60" y="92" font-family="monospace" font-size="11" fill="#A7F3D0">"institution": <tspan fill="#6EE7B7" font-weight="bold">"Universitas Kristen Maranatha"</tspan>,</text>
    <text x="60" y="109" font-family="monospace" font-size="11" fill="#A7F3D0">"focus_areas": [<tspan fill="#34D399" font-weight="bold">"Web Dev", "3D Animation", "EdTech", "UI/UX", "Music Production"</tspan>],</text>
    <text x="60" y="126" font-family="monospace" font-size="11" fill="#A7F3D0">"status": <tspan fill="#6EE7B7" font-weight="bold">"Open for collaborations &amp; research projects!"</tspan></text>
    <text x="40" y="142" font-family="monospace" font-size="11" fill="#6EE7B7" font-weight="bold">}</text>
  </g>

  <!-- Scanline Overlay -->
  <rect width="100%" height="100%" fill="url(#scanlines)" pointer-events="none" />
</svg>
