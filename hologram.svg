<svg xmlns="http://www.w3.org/2000/svg" width="600" height="540" viewBox="0 0 600 540">
  <defs>
    <!-- 1. PENGISI GAMBAR (Pattern): Trik agar foto tampil utuh tanpa zoom -->
       <g clip-path="url(#circle-mask)">
    <rect x="170" y="50" width="260" height="260" fill="#000000" />
    <!-- Ganti URL di bawah dengan link URL bersih dari browser jika gambar belum muncul -->
    <image href="https://raw.githubusercontent.com/khresmupu33/khresmupu33/main/2572032_Khresna.jpg" x="150" y="30" width="300" height="300" filter="url(#matrix-hologram)" preserveAspectRatio="xMidYMid slice" />
  </g>

    <!-- 2. FILTER HIJAU MATRIKS: Diterapkan pada Pattern -->
    <filter id="matrix-hologram">
      <feColorMatrix type="matrix" values="
        0.2  0.7  0.1  0   0
        0.2  0.9  0.1  0   0
        0.1  0.5  0.1  0   0
        0    0    0    1   0" />
    </filter>

    <!-- 3. POLA SCANLINES: Garis horizontal tipis hologram -->
    <pattern id="scanlines" width="100" height="6" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="100" y2="0" stroke="rgba(0, 255, 100, 0.25)" stroke-width="2" />
    </pattern>
  </defs>

  <!-- Latar Belakang Hitam & Bingkai Luar -->
  <rect width="100%" height="100%" fill="#000000" rx="12" />
  <rect x="5" y="5" width="590" height="530" fill="none" stroke="#10B981" stroke-width="2" stroke-dasharray="6 6" rx="10" opacity="0.6" />

  <!-- LINGKARAN HOLOGRAM UTAMA: Menggunakan Pattern yang difilter -->
  <circle cx="300" cy="185" r="140" fill="url(#img-pattern)" filter="url(#matrix-hologram)" stroke="#10B981" stroke-width="4" />

  <!-- LAPISAN EFEK SCANLINES: Ditumpuk di atas gambar -->
  <circle cx="300" cy="185" r="140" fill="url(#scanlines)" pointer-events="none" opacity="0.9" />

  <!-- TEKS STATUS TERMINAL -->
  <text x="300" y="400" font-family="monospace" font-size="17" fill="#10B981" text-anchor="middle" font-weight="bold">[SYSTEM_STATUS: HOLOGRAM_MATRIX_ACTIVE]</text>
  <text x="300" y="440" font-family="monospace" font-size="14" fill="#10B981" text-anchor="middle">&gt; Target: Khresna Mulia Putra (Creative Developer)</text>
  <text x="300" y="465" font-family="monospace" font-size="14" fill="#10B981" text-anchor="middle">&gt; Visual Mode: Green Matrix Point-Cloud Hologram</text>
</svg>
