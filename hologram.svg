<svg xmlns="http://www.w3.org/2000/svg" width="600" height="520" viewBox="0 0 600 520">
  <defs>
    <!-- Efek Filter Matrix Hijau -->
    <filter id="matrix-hologram">
      <feColorMatrix type="matrix" values="
        0.3  0.6  0.1  0   0
        0.3  0.8  0.2  0   0
        0.1  0.4  0.1  0   0
        0    0    0    1   0" />
      <feComponentTransfer>
        <feFuncG type="linear" slope="1.6" />
      </feComponentTransfer>
    </filter>

    <!-- Pola Garis Scanlines Hologram -->
    <pattern id="scanlines" width="100" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="100" y2="0" stroke="rgba(0, 255, 100, 0.3)" stroke-width="2" />
    </pattern>

    <!-- Masker Lingkaran Sempurna -->
    <clipPath id="circle-mask">
      <circle cx="300" cy="180" r="130" />
    </clipPath>
  </defs>

  <!-- Latar Belakang Hitam & Bingkai Luar -->
  <rect width="100%" height="100%" fill="#000000" rx="12" />
  <rect x="5" y="5" width="590" height="510" fill="none" stroke="#10B981" stroke-width="2" stroke-dasharray="6 6" rx="10" opacity="0.6" />

  <!-- Grup yang dibungkus Masker Lingkaran Hologram -->
  <g clip-path="url(#circle-mask)">
    <!-- Latar belakang dalam lingkaran -->
    <rect x="170" y="50" width="260" height="260" fill="#001105" />
    
    <!-- FOTO UTAMA: Ukuran dan posisi diatur pas agar tidak zoom berlebihan -->
    <image href="https://raw.githubusercontent.com/khresmupu33/khresmupu33/main/2572032_Khresna.jpg" x="180" y="60" width="240" height="240" filter="url(#matrix-hologram)" preserveAspectRatio="none" />

    <!-- Efek Garis Scanlines di atas foto -->
    <rect x="170" y="50" width="260" height="260" fill="url(#scanlines)" pointer-events="none" />
  </g>

  <!-- Bingkai Lingkaran Neon Hijau Luar -->
  <circle cx="300" cy="180" r="130" fill="none" stroke="#10B981" stroke-width="4" opacity="0.95" />

  <!-- Teks Status Terminal Hologram -->
  <text x="300" y="375" font-family="monospace" font-size="16" fill="#10B981" text-anchor="middle" font-weight="bold">[SYSTEM_STATUS: HOLOGRAM_MATRIX_ACTIVE]</text>
  <text x="300" y="415" font-family="monospace" font-size="13" fill="#10B981" text-anchor="middle">&gt; Target: Khresna Mulia Putra (Creative Developer)</text>
  <text x="300" y="440" font-family="monospace" font-size="13" fill="#10B981" text-anchor="middle">&gt; Visual Mode: Green Matrix Point-Cloud Hologram</text>
</svg>
