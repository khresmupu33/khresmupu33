<svg xmlns="http://www.w3.org/2000/svg" width="600" height="520" viewBox="0 0 600 520">
  <defs>
    <!-- Filter Matrix Hijau -->
    <filter id="matrix-hologram">
      <feColorMatrix type="matrix" values="
        0.2  0.7  0.1  0   0
        0.2  0.9  0.1  0   0
        0.1  0.5  0.1  0   0
        0    0    0    1   0" />
    </filter>

    <!-- Masker Lingkaran (DIPERBESAR: Radius disesuaikan untuk crop yang lebih ketat) -->
    <clipPath id="circle-mask">
      <circle cx="300" cy="180" r="150" />
    </clipPath>
  </defs>

  <!-- Latar Belakang Hitam & Bingkai Luar -->
  <rect width="100%" height="100%" fill="#000000" rx="12" />
  <rect x="5" y="5" width="590" height="510" fill="none" stroke="#10B981" stroke-width="2" stroke-dasharray="6 6" rx="10" opacity="0.6" />

  <!-- Foto Utama di dalam Lingkaran (DIPERBAIKI: Zoom dan Posisi agar Pas di Tengah) -->
  <!-- Perhitungan agar pas di tengah (pusat 300, 180): -->
  <!-- Gambar asli: 300x300. Setelah diubah, ukurannya menjadi 480x480. -->
  <!-- Sudut kiri atas: x = 300 - (480/2) = 60, y = 180 - (480/2) = -60 -->
  <g clip-path="url(#circle-mask)">
    <rect x="60" y="-60" width="480" height="480" fill="#000000" />
    <image href="https://raw.githubusercontent.com/khresmupu33/khresmupu33/main/2572032_Khresna.jpg" x="60" y="-60" width="480" height="480" filter="url(#matrix-hologram)" />
  </g>

  <!-- Bingkai Lingkaran Neon Hijau -->
  <circle cx="300" cy="180" r="150" fill="none" stroke="#10B981" stroke-width="4" opacity="0.95" />

  <!-- Teks Status Terminal Hologram (DIPERBAIKI: Teks debug dihapus) -->
  <text x="300" y="395" font-family="monospace" font-size="16" fill="#10B981" text-anchor="middle" font-weight="bold">[SYSTEM_STATUS: HOLOGRAM_MATRIX_ACTIVE]</text>
  <text x="300" y="435" font-family="monospace" font-size="13" fill="#10B981" text-anchor="middle">&gt; Target: Khresna Mulia Putra (Creative Developer)</text>
  <text x="300" y="460" font-family="monospace" font-size="13" fill="#10B981" text-anchor="middle">&gt; Visual Mode: Green Matrix Point-Cloud Hologram</text>
</svg>
