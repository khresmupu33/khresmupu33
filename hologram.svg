<svg xmlns="http://www.w3.org/2000/svg" width="600" height="520" viewBox="0 0 600 520">
  <defs>
    <!-- Filter Matrix Hijau -->
    <filter id="matrix-hologram">
      <feColorMatrix type="matrix" values="
        0.2  0.7  0.1  0   0
        0.2  0.9  0.1  0   0
        0.1  0.5  0.1  0   0
        0    0    0    1   0" />
    </filter>

    <!-- Masker Lingkaran (Pastikan cx dan cy konsisten dengan elemen visual) -->
    <clipPath id="circle-mask">
      <circle cx="300" cy="180" r="130" />
    </clipPath>
  </defs>

  <!-- Latar Belakang Hitam & Bingkai Luar -->
  <rect width="100%" height="100%" fill="#000000" rx="12" />
  <rect x="5" y="5" width="590" height="510" fill="none" stroke="#10B981" stroke-width="2" stroke-dasharray="6 6" rx="10" opacity="0.6" />

  <!-- Ganti Latar Belakang Sirkuit Digital (opsional, untuk estetika) -->
  <!-- <image href="https://i.imgur.com/XXXXX.png" x="0" y="0" width="600" height="520" opacity="0.1"/> -->

  <!-- Foto Utama di dalam Lingkaran (DIPERBAIKI: Disesuaikan agar Pas di Tengah) -->
  <!-- Untuk memposisikan gambar di tengah lingkaran, kita perlu menempatkan 'x' dan 'y' pada tag <image> -->
  <!-- agar titik tengah gambar berimpit dengan titik tengah lingkaran (cx="300", cy="180"). -->
  <!-- Jika ukuran gambar asli adalah 300x300, maka koordinat sudut kiri atasnya adalah: -->
  <!-- x = cx - (lebar/2) = 300 - 150 = 150 -->
  <!-- y = cy - (tinggi/2) = 180 - 150 = 30 -->
  <!-- Koordinat ini SUDAH BENAR pada kode Anda sebelumnya. -->
  <g clip-path="url(#circle-mask)">
    <image
        href="https://raw.githubusercontent.com/khresmupu33/khresmupu33/main/2572032_Khresna.jpg"
        x="170"
        y="50"
        width="260"
        height="260"
        preserveAspectRatio="xMidYMid slice"
        filter="url(#matrix-hologram)" />
</g>

  <!-- Bingkai Lingkaran Neon Hijau -->
  <circle cx="300" cy="180" r="130" fill="none" stroke="#10B981" stroke-width="4" opacity="0.95" />

  <!-- Teks Status Terminal Hologram (DIPERBAIKI: Hapus teks debug) -->
  <text x="300" y="375" font-family="monospace" font-size="16" fill="#10B981" text-anchor="middle" font-weight="bold">[SYSTEM_STATUS: HOLOGRAM_MATRIX_ACTIVE]</text>
  <text x="300" y="415" font-family="monospace" font-size="13" fill="#10B981" text-anchor="middle">&gt; Target: Khresna Mulia Putra (Creative Developer)</text>
  <text x="300" y="440" font-family="monospace" font-size="13" fill="#10B981" text-anchor="middle">&gt; Visual Mode: Green Matrix Point-Cloud Hologram</text>
</svg>
