<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="512"
     height="512"
     viewBox="0 0 512 512">

    <defs>
        <clipPath id="avatarClip">
            <circle cx="256" cy="256" r="180"/>
        </clipPath>

        <filter id="glow">
            <feGaussianBlur stdDeviation="8" result="blur"/>
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <!-- Glow -->
    <circle
        cx="256"
        cy="256"
        r="192"
        fill="#00ff66"
        opacity="0.35"
        filter="url(#glow)"
    />

    <!-- Border -->
    <circle
        cx="256"
        cy="256"
        r="186"
        fill="#00ff66"
    />

    <!-- Background -->
    <circle
        cx="256"
        cy="256"
        r="178"
        fill="#111111"
    />

    <!-- Avatar -->
    <image
        href="2572032_Khresna.jpg"
        x="76"
        y="76"
        width="360"
        height="360"
        preserveAspectRatio="xMidYMid slice"
        clip-path="url(#avatarClip)"
    />

</svg>
